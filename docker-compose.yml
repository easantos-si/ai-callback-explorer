services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ai-callback-backend
    restart: unless-stopped
    # Backend is internal-only. The frontend nginx (and cloudflared, when
    # used) reach it through the docker network at backend:3900. No host
    # port publication — direct origin access bypassing the proxy is
    # impossible.
    expose:
      - "3900"
    # Secrets injected at runtime — never baked into the image. Editing
    # .env + `docker-compose up -d` (no rebuild) is enough to rotate any
    # value. The interpolation block below also reads .env at compose
    # parse time for the frontend build args.
    env_file: .env
    networks:
      - ai-callback-network
    # SQLite store for sessions. Lives outside the image so rebuilds
    # don't wipe the session table; expired rows are purged on every
    # startup by SessionService.onModuleInit.
    volumes:
      - ai-callback-data:/app/data
    # ---- Hardening (L1) -----------------------------------------------------
    # The backend runs as the unprivileged `nestjs` user and never needs
    # to call setuid/setgid/chown — drop every Linux capability and lock
    # the root FS read-only. /app/data is the SQLite home (volume above)
    # and /tmp is a small tmpfs for ephemeral writes.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    # mode=1777 makes the tmpfs world-writable+sticky (same as a normal
    # /tmp). Without it, some docker versions default tmpfs to 0755
    # root:root and the unprivileged container user (nestjs uid 1001)
    # gets EACCES on any write. The mount is per-container and discarded
    # on stop, so the broad permission has zero persistent impact.
    tmpfs:
      - /tmp:mode=1777
    pids_limit: 200
    healthcheck:
      test: ["CMD", "node", "-e", "try{require('http').get('http://localhost:3900/api/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))}catch(e){process.exit(1)}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # `mem_limit` / `cpus` work on plain `docker compose up` (without
    # swarm). The legacy `deploy.resources.limits` block was a no-op
    # outside swarm and has been removed.
    mem_limit: 256m
    cpus: 0.5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      # docker-compose interpolates ${VAR} from the project root .env
      # automatically. The Vite build at frontend/Dockerfile reads these
      # via ARG and bakes them into the static bundle.
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-}
        - VITE_WS_PATH=${VITE_WS_PATH:-/socket.io}
    container_name: ai-callback-frontend
    restart: unless-stopped
    # Frontend listens only on the loopback of the host. Cloudflare Tunnel
    # (cloudflared) and any external nginx HTTPS proxy connect via
    # 127.0.0.1:3901. There is no public exposure — direct ingress from
    # outside the host is blocked by the OS, not by the firewall config.
    # Container listens on 8080 (USER nginx, no NET_BIND_SERVICE needed).
    ports:
      - "127.0.0.1:3901:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ai-callback-network
    # ---- Hardening (L1) -----------------------------------------------------
    # nginx master also runs as the unprivileged `nginx` user (see
    # frontend/Dockerfile USER directive). Drop every capability — port
    # 8080 doesn't need NET_BIND_SERVICE, and we never chown/chmod at
    # runtime. Read-only root FS forces every write into the tmpfs list.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    # mode=1777 is required so the unprivileged `nginx` user (uid 101 in
    # the alpine image) can mkdir its temp / pid / cache subdirs at
    # startup. Some docker versions default tmpfs to 0755 root:root,
    # which would EACCES every write attempt and trap nginx in a restart
    # loop. The tmpfs is per-container and discarded on stop.
    #
    # /var/log/nginx is intentionally NOT tmpfs — the alpine image ships
    # access.log and error.log as symlinks to /dev/stdout and /dev/stderr,
    # and tmpfs would replace those symlinks with empty files (so
    # `docker logs` would go silent). Writing through the symlinks works
    # under read_only because /dev/stdout is an fd-redirect, not a real
    # filesystem write.
    tmpfs:
      - /var/cache/nginx:mode=1777
      - /var/run:mode=1777
      - /tmp:mode=1777
    pids_limit: 100
    mem_limit: 64m
    cpus: 0.25

networks:
  ai-callback-network:
    driver: bridge

volumes:
  # Named volume for the SQLite session store. Survives `docker-compose
  # down` / image rebuilds. Wipe with `docker volume rm
  # ai-callback-explorer_ai-callback-data` if you need a clean slate.
  ai-callback-data:
    driver: local

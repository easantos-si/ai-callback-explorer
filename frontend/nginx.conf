# --------------------------------------------------------------------------
# Real-IP extraction
#
# This nginx is fronted by either:
#   (a) Cloudflare Tunnel (cloudflared), in which case the upstream is
#       loopback / docker bridge, and the real client IP comes via
#       CF-Connecting-IP, OR
#   (b) An external HTTPS nginx on the same host, which sets X-Real-IP and
#       X-Forwarded-For.
#
# We trust both Cloudflare's published IP ranges and the local docker bridge.
# Update the CF list periodically from https://www.cloudflare.com/ips/
# --------------------------------------------------------------------------

# Cloudflare IPv4
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;

# Cloudflare IPv6
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;

# Loopback + docker bridge (for external nginx HTTPS or cloudflared
# running in a sibling container)
set_real_ip_from 127.0.0.1;
set_real_ip_from ::1;
set_real_ip_from 172.16.0.0/12;

real_ip_header CF-Connecting-IP;
real_ip_recursive on;

# --------------------------------------------------------------------------
# Anonymized access log — strips the session UUID from /api/callback paths
# so log shippers (Loki, Cloudflare Logpush, etc.) cannot leak hashes.
# --------------------------------------------------------------------------
map $request_uri $redacted_uri {
    default $request_uri;
    "~^(.*/api/callback/)[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}(.*)$" "$1[REDACTED]$2";
}

log_format main_redacted '$remote_addr - $remote_user [$time_local] '
                         '"$request_method $redacted_uri $server_protocol" '
                         '$status $body_bytes_sent "$http_referer"';

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log main_redacted;

    client_max_body_size 50m;
    client_header_timeout 10s;
    client_body_timeout 30s;
    send_timeout 30s;

    # ----------------------------------------------------------------------
    # Security headers
    # The CSP mirrors what Helmet emits at the backend so the contract is
    # the same regardless of which response is being served.
    # ----------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' wss: https:; frame-ancestors 'none'; base-uri 'none'; form-action 'none'; object-src 'none'; upgrade-insecure-requests" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    # X-XSS-Protection is intentionally omitted (legacy header, browsers
    # ignore it; CSP is the authoritative defense).

    # Health check — direct proxy to backend
    location = /health {
        proxy_pass http://backend:3900/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    }

    # API proxy
    location /api/ {
        proxy_pass http://backend:3900/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffering off;
    }

    # Socket.IO — WebSocket + polling transport
    location /socket.io/ {
        proxy_pass http://backend:3900/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_cache off;
    }

    # Vue SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}

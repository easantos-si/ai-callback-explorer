# --------------------------------------------------------------------------
# Real-IP extraction
#
# This nginx is fronted by either:
#   (a) Cloudflare Tunnel (cloudflared), in which case the upstream is
#       loopback / docker bridge, and the real client IP comes via
#       CF-Connecting-IP, OR
#   (b) An external HTTPS nginx on the same host, which sets X-Real-IP and
#       X-Forwarded-For.
#
# We trust both Cloudflare's published IP ranges and the local docker bridge.
# Update the CF list periodically from https://www.cloudflare.com/ips/
# --------------------------------------------------------------------------

# Cloudflare IPv4
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;

# Cloudflare IPv6
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;

# Loopback + docker bridge (for external nginx HTTPS or cloudflared
# running in a sibling container)
set_real_ip_from 127.0.0.1;
set_real_ip_from ::1;
set_real_ip_from 172.16.0.0/12;

real_ip_header CF-Connecting-IP;
real_ip_recursive on;

# --------------------------------------------------------------------------
# Trust gate for the CF-Connecting-IP header forwarded to the backend.
#
# `$realip_remote_addr` is the IP of the *immediate* TCP peer, BEFORE the
# real_ip module rewrites $remote_addr. We only forward CF-Connecting-IP
# to the upstream when that peer matches a known-good source:
#   - any Cloudflare edge IP (direct HTTPS proxy from CF onto this nginx)
#   - the docker bridge (cloudflared running as a sibling container)
#
# Any other peer (notably 127.0.0.1 from a host-side reverse proxy that
# might forget to strip CF-Connecting-IP) gets an empty value, so the
# backend cannot be tricked into trusting a forged IP for rate limit /
# captcha lockout / audit decisions.
# --------------------------------------------------------------------------
map $realip_remote_addr $cf_ip_safe {
    default                                             "";
    # Cloudflare edge ranges (must mirror set_real_ip_from above).
    "~^173\.245\."                                      $http_cf_connecting_ip;
    "~^103\.21\.244\."                                  $http_cf_connecting_ip;
    "~^103\.22\.20[0-3]\."                              $http_cf_connecting_ip;
    "~^103\.31\.[4-7]\."                                $http_cf_connecting_ip;
    "~^141\.101\.([6-9][0-9]|1[01][0-9]|12[0-7])\."     $http_cf_connecting_ip;
    "~^108\.162\.(19[2-9]|2[0-4][0-9]|25[0-5])\."       $http_cf_connecting_ip;
    "~^190\.93\.24[0-9]\."                              $http_cf_connecting_ip;
    "~^188\.114\.(9[6-9]|10[0-9]|11[01])\."             $http_cf_connecting_ip;
    "~^197\.234\.24[0-3]\."                             $http_cf_connecting_ip;
    "~^198\.41\.(1[2-9][0-9]|2[0-4][0-9]|25[0-5])\."    $http_cf_connecting_ip;
    "~^162\.158\."                                      $http_cf_connecting_ip;
    "~^162\.159\."                                      $http_cf_connecting_ip;
    "~^104\.1[6-9]\."                                   $http_cf_connecting_ip;
    "~^104\.2[0-3]\."                                   $http_cf_connecting_ip;
    "~^104\.2[4-7]\."                                   $http_cf_connecting_ip;
    "~^172\.6[4-9]\."                                   $http_cf_connecting_ip;
    "~^172\.7[0-1]\."                                   $http_cf_connecting_ip;
    "~^131\.0\.7[2-5]\."                                $http_cf_connecting_ip;
    # Docker bridge — cloudflared running as a sibling container in the
    # 172.16.0.0/12 RFC1918 block.
    "~^172\.(1[6-9]|2[0-9]|3[01])\."                    $http_cf_connecting_ip;
}

# --------------------------------------------------------------------------
# Anonymized access log — strips the session UUID from /api/callback paths
# so log shippers (Loki, Cloudflare Logpush, etc.) cannot leak hashes.
# --------------------------------------------------------------------------
map $request_uri $redacted_uri {
    default $request_uri;
    "~^(.*/api/callback/)[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}(.*)$" "$1[REDACTED]$2";
}

log_format main_redacted '$remote_addr - $remote_user [$time_local] '
                         '"$request_method $redacted_uri $server_protocol" '
                         '$status $body_bytes_sent "$http_referer"';

# --------------------------------------------------------------------------
# Rate-limit zones — applied at server/location scope below. Sized for ~50k
# unique IPs (10MB ≈ 160k entries at ~64B each).
#
#   api  : everything under /api/ EXCEPT the public callback ingest. Tighter
#          because it covers login / sessions / admin / refresh.
#   cb   : /api/callback/* — webhook ingest, can legitimately come in
#          bursts from the same upstream IP (Cloudflare/Vercel egress).
#   conn : per-IP concurrent connection cap, applies everywhere.
# --------------------------------------------------------------------------
limit_req_zone  $binary_remote_addr zone=api:10m   rate=20r/s;
limit_req_zone  $binary_remote_addr zone=cb:10m    rate=200r/s;
limit_conn_zone $binary_remote_addr zone=conn:10m;

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log main_redacted;

    # Hide the nginx version banner — pure information leak otherwise.
    server_tokens off;

    client_max_body_size 50m;
    client_header_timeout 10s;
    client_body_timeout 30s;
    send_timeout 30s;

    # Restrict HTTP methods at the edge. The backend accepts every method
    # only on /api/callback/* (handled in that location below); everything
    # else uses a fixed verb set.
    if ($request_method !~ ^(GET|HEAD|POST|DELETE|OPTIONS)$) {
        return 405;
    }

    # Defence-in-depth: block any path component starting with a dot. The
    # SPA bundle never references such paths, so legitimate users see no
    # change. Attackers probing for /.env / /.git/* / /.well-known of
    # other apps get a clean 404.
    location ~ /\. {
        deny all;
        return 404;
    }

    # ----------------------------------------------------------------------
    # Security headers
    # The CSP mirrors what Helmet emits at the backend so the contract is
    # the same regardless of which response is being served.
    # ----------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'none'; form-action 'none'; object-src 'none'; upgrade-insecure-requests" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    # X-XSS-Protection is intentionally omitted (legacy header, browsers
    # ignore it; CSP is the authoritative defense).

    # Health check — direct proxy to backend
    location = /health {
        proxy_pass http://backend:3900/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # Anti-smuggling: drop the client's Connection header so it can't
        # influence keep-alive on the upstream socket.
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $cf_ip_safe;
    }

    # Public callback ingest — separate location so we can apply a
    # webhook-friendly rate limit and a permissive method set without
    # opening the rest of /api to the same.
    location ^~ /api/callback/ {
        limit_req  zone=cb burst=400 nodelay;
        limit_conn conn 100;

        proxy_pass http://backend:3900/api/callback/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $cf_ip_safe;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffering off;
    }

    # Authenticated API surface (login, sessions, admin, etc.)
    location /api/ {
        limit_req  zone=api burst=40 nodelay;
        limit_conn conn 30;

        proxy_pass http://backend:3900/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $cf_ip_safe;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffering off;
    }

    # Socket.IO — WebSocket + polling transport. No limit_req here because
    # a single user-driven WS session emits many small frames; we cap
    # concurrent connections instead.
    location /socket.io/ {
        limit_conn conn 30;

        proxy_pass http://backend:3900/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $cf_ip_safe;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_cache off;
    }

    # Vue SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
